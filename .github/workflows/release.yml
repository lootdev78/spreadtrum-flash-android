name: Android CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub Release after building the signed APK"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag for manual release publishing, for example v2.1.0. Leave empty to only build/upload artifact."
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  debug:
    name: Verify, test, lint, and debug build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: read

    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs=-Xmx4g
        -Dkotlin.incremental=false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android toolchain
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358" \
            "cmake;3.22.1"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify project structure
        run: python3 tools/verify_project.py

      - name: Run unit tests
        run: ./gradlew --no-daemon --stacktrace :app:testDebugUnitTest

      - name: Run Android lint
        run: ./gradlew --no-daemon --stacktrace :app:lintDebug

      - name: Build debug APK
        run: ./gradlew --no-daemon --stacktrace :app:assembleDebug

      - name: Record debug APK checksum
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"
          sha256sum "$APK" > "$APK.sha256"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sprd-flash-studio-debug-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/app-debug.apk.sha256

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprd-flash-studio-reports-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/

  release:
    name: Signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs=-Xmx4g
        -Dkotlin.incremental=false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android toolchain
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358" \
            "cmake;3.22.1"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify project structure
        run: python3 tools/verify_project.py

      - name: Check release signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${KEYSTORE_BASE64}" ]; then
            echo "::error::Missing secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi

          if [ -z "${KEYSTORE_PASSWORD}" ]; then
            echo "::error::Missing secret ANDROID_KEYSTORE_PASSWORD"
            exit 1
          fi

          if [ -z "${KEY_ALIAS}" ]; then
            echo "::error::Missing secret ANDROID_KEY_ALIAS"
            exit 1
          fi

          if [ -z "${KEY_PASSWORD}" ]; then
            echo "::error::Missing secret ANDROID_KEY_PASSWORD"
            exit 1
          fi

      - name: Decode release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "${RUNNER_TEMP}/release.jks"
          test -s "${RUNNER_TEMP}/release.jks"

      - name: Run unit tests
        run: ./gradlew --no-daemon --stacktrace :app:testDebugUnitTest

      - name: Run release lint
        run: ./gradlew --no-daemon --stacktrace :app:lintRelease

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew \
            --no-daemon \
            --stacktrace \
            :app:assembleRelease

      - name: Verify APK signature
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          test -f "$APK"
          "${ANDROID_HOME}/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$APK"

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            ASSET_SUFFIX="${GITHUB_REF_NAME}"
            SHOULD_PUBLISH_RELEASE="true"
          else
            TAG_NAME="${INPUT_RELEASE_TAG}"
            SHOULD_PUBLISH_RELEASE="${INPUT_PUBLISH_RELEASE}"

            if [ -n "${TAG_NAME}" ]; then
              ASSET_SUFFIX="${TAG_NAME}"
            else
              ASSET_SUFFIX="manual-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
              SHOULD_PUBLISH_RELEASE="false"
            fi
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "asset_suffix=${ASSET_SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "should_publish_release=${SHOULD_PUBLISH_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Prepare release files
        shell: bash
        env:
          ASSET_SUFFIX: ${{ steps.meta.outputs.asset_suffix }}
        run: |
          set -euo pipefail

          APK="app/build/outputs/apk/release/app-release.apk"
          OUT_DIR="release-output"
          OUT_APK="${OUT_DIR}/sprd-flash-studio-${ASSET_SUFFIX}.apk"

          test -f "$APK"

          mkdir -p "$OUT_DIR"
          cp "$APK" "$OUT_APK"

          (
            cd "$OUT_DIR"
            sha256sum "sprd-flash-studio-${ASSET_SUFFIX}.apk" > "sprd-flash-studio-${ASSET_SUFFIX}.apk.sha256"
          )

          if [ -f "app/build/outputs/mapping/release/mapping.txt" ]; then
            cp "app/build/outputs/mapping/release/mapping.txt" "${OUT_DIR}/mapping-${ASSET_SUFFIX}.txt"
          fi

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprd-flash-studio-release-${{ steps.meta.outputs.asset_suffix }}
          if-no-files-found: error
          retention-days: 30
          path: |
            release-output/*

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprd-flash-studio-release-reports-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            app/build/reports/lint-results-release.html
            app/build/reports/lint-results-release.xml
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/

      - name: Publish GitHub Release
        if: steps.meta.outputs.should_publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: SPRD Flash Studio ${{ steps.meta.outputs.tag_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ inputs.prerelease || false }}
          files: |
            release-output/*
