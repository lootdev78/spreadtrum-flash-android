name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Verify, test, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.jvmargs=-Xmx4g
        -Dkotlin.incremental=false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Android toolchain
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358" \
            "cmake;3.22.1"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify project structure
        run: python3 tools/verify_project.py

      - name: Run unit tests
        run: ./gradlew --no-daemon --stacktrace :app:testDebugUnitTest

      - name: Run Android lint
        run: ./gradlew --no-daemon --stacktrace :app:lintDebug

      - name: Build debug APK
        run: ./gradlew --no-daemon --stacktrace :app:assembleDebug

      - name: Record APK checksum
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"
          sha256sum "$APK" > "$APK.sha256"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sprd-flash-studio-debug-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/app-debug.apk.sha256

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprd-flash-studio-reports-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
