name: Feature request
description: Suggest an improvement to the Android app or build workflow
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should be improved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: USB, flash, and safety impact
      description: Explain any effect on target selection, loaders, writes, erase operations, repartitioning, or cancellation.
    validations:
      required: true
